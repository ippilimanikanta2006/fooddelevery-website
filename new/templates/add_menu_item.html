{% extends "base.html" %}
{% block title %}Add Menu Item – FoodDash{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
            <div class="card-header bg-accent text-white p-4">
                <h2 class="h4 mb-0"><i class="bi bi-plus-circle me-2"></i>Add New Menu Item</h2>
            </div>
            <div class="card-body p-4">
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="name" class="form-label fw-semibold text-secondary">Item Name</label>
                        <input type="text" class="form-control form-control-lg rounded-3" id="name" name="name" required placeholder="e.g. Paneer Butter Masala">
                    </div>
                    
                    <div class="mb-3">
                        <label for="price" class="form-label fw-semibold text-secondary">Price (₹)</label>
                        <div class="input-group">
                            <span class="input-group-text rounded-start-3">₹</span>
                            <input type="number" step="0.01" class="form-control form-control-lg rounded-end-3" id="price" name="price" required placeholder="0.00">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label fw-semibold text-secondary">Description</label>
                        <textarea class="form-control rounded-3" id="description" name="description" rows="3" placeholder="Describe the dish..."></textarea>
                    </div>
                    
                    <div class="mb-4">
                        <label for="image" class="form-label fw-semibold text-secondary">Photo</label>
                        <input type="file" class="form-control rounded-3" id="image" name="image" accept="image/*">
                        <div class="form-text mt-1">Upload a clear photo of the dish (PNG, JPG).</div>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-accent btn-lg rounded-3 py-3 shadow-sm">
                            <i class="bi bi-cloud-arrow-up me-1"></i>Add to Menu
                        </button>
                        <a href="{{ url_for('admin_orders') }}" class="btn btn-link text-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
