{% extends "base.html" %}
{% block title %}Add Menu Item – FoodDash{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-lg border-0" style="border-radius: 1.5rem;">
            <div class="card-header bg-white border-0 pt-5 pb-3 px-5 text-center">
                <div class="d-inline-flex bg-primary bg-opacity-10 text-primary p-3 rounded-circle mb-3">
                    <i class="bi bi-plus-circle fs-2"></i>
                </div>
                <h2 class="h3 fw-800 mb-0 text-heading">Add Menu Item</h2>
            </div>
            <div class="card-body px-5 pb-5 pt-2">
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-4">
                        <label for="name" class="form-label small fw-bold text-uppercase opacity-75">Item Name</label>
                        <input type="text" class="form-control form-control-lg" id="name" name="name" required placeholder="e.g. Paneer Butter Masala">
                    </div>
                    
                    <div class="mb-4">
                        <label for="price" class="form-label small fw-bold text-uppercase opacity-75">Price (₹)</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0">₹</span>
                            <input type="number" step="0.01" class="form-control form-control-lg border-start-0 ps-0" id="price" name="price" required placeholder="0.00">
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="description" class="form-label small fw-bold text-uppercase opacity-75">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="3" placeholder="Describe the dish..."></textarea>
                    </div>
                    
                    <div class="mb-5">
                        <label for="image" class="form-label small fw-bold text-uppercase opacity-75">Photo</label>
                        <input type="file" class="form-control" id="image" name="image" accept="image/*">
                        <div class="form-text mt-2 small">Upload a clear photo of the dish (PNG, JPG).</div>
                    </div>
                    
                    <div class="d-grid gap-3">
                        <button type="submit" class="btn btn-primary btn-lg py-3 shadow-sm">
                            Add to Menu
                        </button>
                        <a href="{{ url_for('admin_menu') }}" class="btn btn-outline-secondary py-3">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
