{% extends "base.html" %}
{% block title %}Login – FoodDash{% endblock %}

{% block extra_css %}
<style>
    .login-wrapper {
        min-height: calc(100vh - 300px);
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .login-card {
        max-width: 440px;
        width: 100%;
        padding: 3rem;
        background: var(--card-bg);
        border-radius: 1.5rem;
        border: 1px solid rgba(0,0,0,0.05);
    }
    .login-card h2 { 
        font-weight: 800;
        letter-spacing: -1px;
    }
    .brand-accent {
        color: var(--primary);
    }
    .input-group-text {
        background-color: transparent;
        border-right: none;
        color: var(--body-text);
    }
    .form-control {
        border-left: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card shadow-lg">
        <div class="text-center mb-4">
            <h2 class="mb-1"><i class="bi bi-fire brand-accent me-2"></i>FoodDash</h2>
            <p class="text-secondary small">Good food is just a click away</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <label for="username" class="form-label small fw-bold text-uppercase opacity-75">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="username" name="username" placeholder="Username" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label small fw-bold text-uppercase opacity-75">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-3 mb-3 shadow">
                Login to Account
            </button>
        </form>

        <p class="text-center text-secondary small mb-0">
            Don't have an account? <a href="{{ url_for('register') }}" class="text-primary fw-bold text-decoration-none">Create one</a>
        </p>

        <div class="position-relative my-4">
            <hr class="opacity-10">
            <span class="position-absolute top-50 start-50 translate-middle bg-white px-3 small text-secondary">OR</span>
        </div>

        <a href="{{ url_for('admin_orders') }}" class="btn btn-outline-dark w-100 py-2 py-lg-3 d-flex align-items-center justify-content-center">
            <i class="bi bi-shield-lock-fill me-2"></i> Admin Login
        </a>
    </div>
</div>
{% endblock %}
