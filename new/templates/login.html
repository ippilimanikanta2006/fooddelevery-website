{% extends "base.html" %}
{% block title %}Login – FoodDash{% endblock %}

{% block extra_css %}
<style>
    .login-wrapper {
        min-height: calc(100vh - 200px);
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .login-card {
        max-width: 420px;
        width: 100%;
        background: linear-gradient(145deg, #1a1d23, #16181e);
        border: 1px solid rgba(255,107,53,.1);
        border-radius: 1rem;
        padding: 2.5rem;
    }
    .login-card h2 { font-weight: 800; }
    .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 .2rem rgba(255,107,53,.25); }
</style>
{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card shadow-lg">
        <h2 class="text-center mb-1"><i class="bi bi-fire text-warning me-2"></i>FoodDash</h2>
        <p class="text-center text-secondary mb-4">Sign in to your account</p>

        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control bg-dark border-secondary text-light" id="username" name="username" placeholder="Enter username" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control bg-dark border-secondary text-light" id="password" name="password" placeholder="Enter password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-accent w-100 py-2 mb-3">
                <i class="bi bi-box-arrow-in-right me-1"></i>Login
            </button>
        </form>

        <p class="text-center text-secondary mb-0">
            Don't have an account? <a href="{{ url_for('register') }}" class="text-decoration-none" style="color:var(--accent)">Register</a>
        </p>

        <hr class="border-secondary my-3">

        <a href="{{ url_for('admin_orders') }}" class="btn btn-outline-light w-100 py-2">
            <i class="bi bi-shield-lock me-1"></i>Admin Panel
        </a>
    </div>
</div>
{% endblock %}
