{% extends "base.html" %}
{% block title %}Register – FoodDash{% endblock %}

{% block extra_css %}
<style>
    .register-wrapper {
        min-height: calc(100vh - 300px);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .register-card {
        max-width: 480px;
        width: 100%;
        padding: 3rem;
        background: var(--card-bg);
        border-radius: 1.5rem;
        border: 1px solid rgba(0,0,0,0.05);
    }

    .register-card h2 {
        font-weight: 800;
        letter-spacing: -1px;
    }

    .input-group-text {
        background-color: transparent;
        border-right: none;
        color: var(--body-text);
    }
    .form-control, .form-select {
        border-left: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="register-wrapper">
    <div class="register-card shadow-lg">
        <div class="text-center mb-4">
            <h2 class="mb-1">Create Account</h2>
            <p class="text-secondary small">Join the FoodDash community today</p>
        </div>

        <form method="POST" action="{{ url_for('register') }}">
            <div class="mb-3">
                <label for="username" class="form-label small fw-bold text-uppercase opacity-75">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="username"
                        name="username" placeholder="Pick a username" required autofocus>
                </div>
            </div>
            <div class="mb-3">
                <label for="phone" class="form-label small fw-bold text-uppercase opacity-75">Phone Number</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                    <input type="tel" class="form-control" id="phone" name="phone"
                        placeholder="e.g. 9876543210" required>
                </div>
            </div>
            <div class="mb-3">
                <label for="role" class="form-label small fw-bold text-uppercase opacity-75">Register As</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                    <select class="form-select" id="role" name="role">
                        <option value="customer" selected>Customer</option>
                        <option value="restaurant_owner">Restaurant Owner (Admin)</option>
                    </select>
                </div>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label small fw-bold text-uppercase opacity-75">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password"
                        name="password" placeholder="Create a password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-3 mb-3 shadow">
                Create Account
            </button>
        </form>

        <p class="text-center text-secondary small mb-0">
            Already have an account? <a href="{{ url_for('login') }}" class="text-primary fw-bold text-decoration-none">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
