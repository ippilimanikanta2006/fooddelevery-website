{% extends "base.html" %}
{% block title %}Register – FoodDash{% endblock %}

{% block extra_css %}
<style>
    .register-wrapper {
        min-height: calc(100vh - 200px);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .register-card {
        max-width: 440px;
        width: 100%;
        background: linear-gradient(145deg, #1a1d23, #16181e);
        border: 1px solid rgba(255, 107, 53, .1);
        border-radius: 1rem;
        padding: 2.5rem;
    }

    .register-card h2 {
        font-weight: 800;
    }

    .form-control:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 .2rem rgba(255, 107, 53, .25);
    }
</style>
{% endblock %}

{% block content %}
<div class="register-wrapper">
    <div class="register-card shadow-lg">
        <h2 class="text-center mb-1"><i class="bi bi-person-plus text-warning me-2"></i>Create Account</h2>
        <p class="text-center text-secondary mb-4">Join FoodDash as a customer</p>

        <form method="POST" action="{{ url_for('register') }}">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control bg-dark border-secondary text-light" id="username"
                        name="username" placeholder="Pick a username" required autofocus>
                </div>
            </div>
            <div class="mb-3">
                <label for="phone" class="form-label">Phone Number</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary"><i class="bi bi-telephone"></i></span>
                    <input type="tel" class="form-control bg-dark border-secondary text-light" id="phone" name="phone"
                        placeholder="e.g. 9876543210" required>
                </div>
            </div>
            <div class="mb-3">
                <label for="role" class="form-label">Register As</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary"><i class="bi bi-person-badge"></i></span>
                    <select class="form-select bg-dark border-secondary text-light" id="role" name="role">
                        <option value="customer" selected>Customer</option>
                        <option value="restaurant_owner">Restaurant Owner (Admin)</option>
                    </select>
                </div>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control bg-dark border-secondary text-light" id="password"
                        name="password" placeholder="Create a password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-accent w-100 py-2 mb-3">
                <i class="bi bi-check-circle me-1"></i>Register
            </button>
        </form>

        <p class="text-center text-secondary mb-0">
            Already have an account? <a href="{{ url_for('login') }}" class="text-decoration-none"
                style="color:var(--accent)">Login</a>
        </p>
    </div>
</div>
{% endblock %}
